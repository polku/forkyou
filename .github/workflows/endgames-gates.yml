name: Endgames Gates

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci-gate:
    name: STC ci_gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run ci_gate benchmark
        run: |
          node benchmarks/endgames/run-benchmark.js \
            --gate ci_gate \
            --runs 20 \
            --timeoutMs 200 \
            --output benchmarks/endgames/results-ci-gate.json
      - name: Upload ci_gate artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-gate-results
          path: benchmarks/endgames/results-ci-gate.json

  release-gate:
    name: LTC release_gate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run release_gate benchmark
        run: |
          node benchmarks/endgames/run-benchmark.js \
            --gate release_gate \
            --runs 20 \
            --timeoutMs 200 \
            --output benchmarks/endgames/results-release-gate.json
      - name: Upload release_gate artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-results
          path: benchmarks/endgames/results-release-gate.json

  replay-proof:
    name: Deterministic replay proof
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run replay benchmark #1
        run: |
          mkdir -p benchmarks/endgames/replay-proof
          node benchmarks/endgames/run-benchmark.js \
            --gate ci_gate \
            --runs 20 \
            --timeoutMs 200 \
            --output benchmarks/endgames/replay-proof/run1.json \
            | tee benchmarks/endgames/replay-proof/run1.log
      - name: Run replay benchmark #2
        run: |
          node benchmarks/endgames/run-benchmark.js \
            --gate ci_gate \
            --runs 20 \
            --timeoutMs 200 \
            --output benchmarks/endgames/replay-proof/run2.json \
            | tee benchmarks/endgames/replay-proof/run2.log
      - name: Verify replay outcomes
        run: |
          node benchmarks/endgames/verify-replay.js \
            benchmarks/endgames/replay-proof/run1.json \
            benchmarks/endgames/replay-proof/run2.json \
            benchmarks/endgames/replay-proof/run1.log \
            benchmarks/endgames/replay-proof/run2.log \
            benchmarks/endgames/replay-proof/verification.json
      - name: Upload replay proof artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deterministic-replay-proof
          path: benchmarks/endgames/replay-proof/
